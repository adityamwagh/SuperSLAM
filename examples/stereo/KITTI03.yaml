
#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------

# Camera calibration and distortion parameters (OpenCV)
Camera.fx: 721.5377
Camera.fy: 721.5377
Camera.cx: 609.5593
Camera.cy: 172.854

Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0

Camera.width: 1241
Camera.height: 376

# Camera frames per second
Camera.fps: 10.0

# stereo baseline times fx
Camera.bf: 387.5744

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

# Close/Far threshold. Baseline times.
ThDepth: 35

#--------------------------------------------------------------------------------------------
# SuperPoint/LightGlue Parameters
#--------------------------------------------------------------------------------------------

# SuperPoint model configuration file

# SuperPoint model directory (where .engine files are located)
SuperPoint.model_dir: "weights/"
superpoint:
  max_keypoints: 600
  keypoint_threshold: 0.005
  remove_borders: 4
  input_tensor_names:
    - "input"
  output_tensor_names:
    - "scores"
    - "descriptors"
  onnx_file: "superpoint_dense_dynamic_batch.onnx"
  engine_file: "superpoint_dense_dynamic_batch_fp16.engine"
  dla_core: -1

lightglue:
  image_width: 1241
  image_height: 376
  onnx_file: "lightglue_superpoint.onnx"
  engine_file: "lightglue_superpoint_fp16.engine"
  dla_core: -1

loop:
  image_width: 512
  image_height: 512
  onnx_file: "eigenplaces_resnet18_512.onnx"
  engine_file: "eigenplaces_resnet18_512_fp16.engine"

# Backend sliding-window smoother size. env SUPERSLAM_WS_WINDOW overrides.
Backend.window_size: 10
