# Camera Parameters (RECTIFIED). These match LEFT.P below (alpha=0 stereoRectify).
#--------------------------------------------------------------------------------------------
Camera.fx: 436.2345864
Camera.fy: 436.2345864
Camera.cx: 364.4412346
Camera.cy: 256.9516754

# Images are rectified and undistorted by the loader; distortion is zero here.
Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0

Camera.width: 752
Camera.height: 480

# Camera frames per second
Camera.fps: 20.0

# stereo baseline (m) times fx ( -P2[0,3] )
Camera.bf: 48.01976196

# Color order of the images (0: BGR, 1: RGB. Ignored for grayscale)
Camera.RGB: 1

# Close/Far threshold. Baseline times.
ThDepth: 35


