
#--------------------------------------------------------------------------------------------
# Camera Parameters (TUM RGB-D freiburg2). Images fed raw; System undistorts.
#--------------------------------------------------------------------------------------------
Camera.fx: 520.908620
Camera.fy: 521.007327
Camera.cx: 325.141442
Camera.cy: 249.701764

Camera.k1: 0.231222
Camera.k2: -0.784899
Camera.p1: -0.003257
Camera.p2: -0.000105
Camera.k3: 0.917205

Camera.width: 640
Camera.height: 480

# Camera frames per second
Camera.fps: 30.0

# IR projector baseline times fx (approx., for RGB-D close/far thresholding)
Camera.bf: 40.0

# Color order of the images (0: BGR, 1: RGB)
Camera.RGB: 1

# Close/Far threshold. Baseline times.
ThDepth: 40.0

# Depth map values factor (TUM 16-bit depth is in 1/5000 m)
DepthMapFactor: 5000.0


#--------------------------------------------------------------------------------------------
# SuperPoint Parameters (RGB-D uses SuperPoint + depth; no learned matcher)
#--------------------------------------------------------------------------------------------
SuperPoint.model_dir: "weights/"
superpoint:
  max_keypoints: 1000
  keypoint_threshold: 0.005
  remove_borders: 4
  input_tensor_names:
    - "input"
  output_tensor_names:
    - "scores"
    - "descriptors"
  onnx_file: "superpoint_dense_dynamic_batch.onnx"
  engine_file: "superpoint_dense_dynamic_batch_fp16.engine"
  dla_core: -1

lightglue:
  image_width: 640
  image_height: 480
  onnx_file: "lightglue_superpoint.onnx"
  engine_file: "lightglue_superpoint_fp16.engine"
  dla_core: -1

loop:
  image_width: 512
  image_height: 512
  onnx_file: "eigenplaces_resnet18_512.onnx"
  engine_file: "eigenplaces_resnet18_512_fp16.engine"

# Backend sliding-window smoother size. env SUPERSLAM_WS_WINDOW overrides.
Backend.window_size: 8
